<!DOCTYPE html>
<html>
  <head>
    <title>NFL Standings Predictor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="styles/standings/summary.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="background">
      <div class="headerText">Click summary to download image</div>
      <div class="summary" id="summary">
        <div class="header">
          <img class="headerLogo" src="">
          <span class="headerTeamText"></span>
        </div>
        <div class="record">Record: <span class="wins"></span>-<span class="losses"></span></div>
        <div class="results">
          <div class="home">
            <div class="text">Home</div>
            <div class="gamesBox homeGamesBox"></div>
          </div>
          <div class="away">
            <div class="text">Away</div>
            <div class="gamesBox awayGamesBox"></div>
          </div>
        </div>
        <div class="footer">Create Your Own at MockParadox.com</div>
      </div>
      <div class="buttonsRow">
        <div class="button schedule">New Schedule</div>
        <div class="button mock">Mock Draft</div>
      </div>
    </div>
  </body>

  <script type="module" src="scripts/standings/summary.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</html>
